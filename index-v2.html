<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyCut</title>
    <link rel="stylesheet" href="styles-v2.css">
</head>
<body>
    <!-- 激活界面 -->
    <div id="activation-screen" class="activation-screen" style="display: flex !important;">
        <div class="activation-container">
            <div class="activation-card slide-up">
                <div class="activation-logo">
                    <div class="logo-icon">E</div>
                </div>
                <h1 class="activation-title">EasyCut</h1>
                <p class="activation-subtitle">专业的网络管理工具</p>

                <div class="activation-form">
                    <div class="input-container">
                        <div class="input-icon">🔑</div>
                        <input
                            type="text"
                            id="activation-code-input"
                            class="activation-input"
                            placeholder="请输入唯一激活码"
                            maxlength="19"
                        >
                    </div>

                    <button id="activate-button" class="activate-button">
                        激活许可证
                    </button>

                    <div id="activation-message" class="activation-message" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 主应用界面 -->
    <div id="main-app" class="container" style="display: none !important;">
        <!-- 应用头部 -->
        <header class="app-header">
            <div class="app-logo">EasyCut</div>
            <div class="header-actions">
                <button id="btn-settings" class="icon-button" title="设置">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
                <button id="btn-share" class="icon-button" title="分享">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="18" cy="5" r="3"></circle>
                        <circle cx="6" cy="12" r="3"></circle>
                        <circle cx="18" cy="19" r="3"></circle>
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                    </svg>
                </button>
            </div>
        </header>

        <!-- 状态卡片 -->
        <div class="status-card fade-in">
            <div class="status-header">
                <div class="status-icon">🌐</div>
                <div class="status-info">
                    <div class="status-label">网络状态</div>
                    <div class="status-value" id="network-status">已连接</div>
                </div>
            </div>
            <div class="status-mode">当前模式: <span id="current-mode">双网模式</span></div>
            <div class="status-badges">
                <div class="status-badge active" id="badge-external">外网: 启用</div>
                <div class="status-badge active" id="badge-internal">内网: 启用</div>
            </div>
        </div>

        <!-- 模式切换 -->
        <div class="mode-section">
            <div class="mode-cards">
                <div class="mode-card" id="mode-external" onclick="switchMode('external')">
                    <div class="mode-icon">📡</div>
                    <div class="mode-name">启用外网</div>
                    <div class="mode-active-indicator">✓</div>
                </div>
                <div class="mode-card active" id="mode-both" onclick="switchMode('both')">
                    <div class="mode-icon">🌐</div>
                    <div class="mode-name">同时启用</div>
                    <div class="mode-active-indicator">✓</div>
                </div>
            </div>
        </div>

        <!-- 网络接口 -->
        <div class="section-header">
            <h2 class="section-title">网络接口</h2>
            <div class="section-action" onclick="refreshInterfaces()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
                更新
            </div>
        </div>

        <div class="interface-card">
            <div class="interface-item" id="interface-wifi">
                <div class="interface-header">
                    <div class="interface-icon">📶</div>
                    <div class="interface-info">
                        <div class="interface-name">WiFi - 内网</div>
                        <div class="interface-status">
                            <span class="interface-status-dot"></span>
                            <span>已连接</span>
                        </div>
                    </div>
                </div>
                <div class="interface-details">信号: 强 • IP: 192.168.1.100</div>
                <div class="interface-action">
                    <button class="interface-btn disable" onclick="toggleInterface('wifi', 'disable')">禁用</button>
                </div>
            </div>

            <div class="interface-item" id="interface-ethernet">
                <div class="interface-header">
                    <div class="interface-icon">🔌</div>
                    <div class="interface-info">
                        <div class="interface-name">以太网 - 外网</div>
                        <div class="interface-status">
                            <span class="interface-status-dot disabled"></span>
                            <span>已禁用</span>
                        </div>
                    </div>
                </div>
                <div class="interface-action">
                    <button class="interface-btn enable" onclick="toggleInterface('ethernet', 'enable')">启用</button>
                </div>
            </div>
        </div>

        <!-- 管理员权限提示 -->
        <div id="admin-warning" class="warning-box" style="display: none;">
            ⚠️ 请以管理员身份运行此程序
        </div>

        <!-- 状态栏 -->
        <div class="status-bar">
            <svg class="status-icon" viewBox="0 0 24 24" fill="currentColor">
                <circle cx="12" cy="12" r="10"></circle>
            </svg>
            <span class="status-text" id="status-text">就绪</span>
        </div>
    </div>

    <!-- 分享覆盖层 -->
    <div id="share-overlay" class="share-overlay" style="display: none;">
        <div class="share-wrapper">
            <img src="assets/icon_wubai.png" alt="分享二维码" class="share-qr">
            <div class="share-text">公众号500佰<br>欢迎留言 发送EasyCut获取下载链接</div>
        </div>
    </div>

    <script src="renderer.js"></script>
    <script src="settings.js"></script>
    <script>
        // 模式切换
        function switchMode(mode) {
            const modeExternal = document.getElementById('mode-external');
            const modeBoth = document.getElementById('mode-both');
            const currentModeText = document.getElementById('current-mode');

            // 移除所有active类
            modeExternal.classList.remove('active');
            modeBoth.classList.remove('active');

            // 添加active类
            if (mode === 'external') {
                modeExternal.classList.add('active');
                currentModeText.textContent = '外网模式';
            } else {
                modeBoth.classList.add('active');
                currentModeText.textContent = '双网模式';
            }

            // 更新状态
            updateStatus('切换中...');
            setTimeout(() => {
                updateStatus('就绪');
            }, 1000);
        }

        // 切换接口状态
        function toggleInterface(interfaceName, action) {
            updateStatus(`${interfaceName === 'wifi' ? 'WiFi' : '以太网'} ${action === 'enable' ? '启用' : '禁用'}中...`);
            setTimeout(() => {
                updateStatus('就绪');
            }, 1000);
        }

        // 刷新接口
        function refreshInterfaces() {
            updateStatus('更新中...');
            setTimeout(() => {
                updateStatus('已更新');
            }, 1000);
        }

        // 更新状态
        function updateStatus(text) {
            document.getElementById('status-text').textContent = text;
        }
    </script>
</body>
</html>
