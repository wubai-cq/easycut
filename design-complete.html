<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyCut - 完整UI设计</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app {
            width: 400px;
            height: 800px;
            background: linear-gradient(135deg, #0E1122 0%, #0a0e18 50%, #151b2e 100%);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            border: 1px solid rgba(57, 230, 207, 0.1);
        }

        /* ===== 顶部导航栏 ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 28px;
            background: linear-gradient(180deg, rgba(26, 29, 46, 0.6) 0%, rgba(26, 29, 46, 0.2) 100%);
            border-bottom: 1px solid rgba(57, 230, 207, 0.1);
        }

        .app-title {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            background: rgba(57, 230, 207, 0.1);
            border: 1px solid rgba(57, 230, 207, 0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .icon-btn:hover {
            background: rgba(57, 230, 207, 0.2);
        }

        /* ===== 主内容 ===== */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        /* ===== 网络状态卡片 ===== */
        .status-card {
            background: linear-gradient(135deg, #25293E 0%, #1f2736 100%);
            border: 1px solid rgba(57, 230, 207, 0.2);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .status-header {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            align-items: center;
        }

        .status-icon {
            font-size: 28px;
            width: 48px;
            height: 48px;
            background: rgba(57, 230, 207, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-title {
            font-size: 14px;
            font-weight: 600;
            color: #8a8d9e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-value {
            font-size: 42px;
            font-weight: 700;
            color: #39e6cf;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }

        .mode-display {
            background: rgba(57, 230, 207, 0.05);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .mode-label {
            font-size: 12px;
            color: #8a8d9e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .mode-value {
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            margin-top: 4px;
        }

        .badges {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .badge {
            background: rgba(57, 230, 207, 0.2);
            color: #5ff5e0;
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }

        /* ===== 模式卡片 ===== */
        .modes-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }

        .mode-card {
            background: linear-gradient(135deg, rgba(42, 45, 62, 0.8) 0%, rgba(37, 42, 62, 0.8) 100%);
            border: 2px solid rgba(57, 230, 207, 0.1);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .mode-card:hover {
            background: linear-gradient(135deg, rgba(52, 60, 80, 0.9) 0%, rgba(47, 52, 72, 0.9) 100%);
            border-color: rgba(57, 230, 207, 0.3);
            box-shadow: 0 0 20px rgba(57, 230, 207, 0.2);
        }

        .mode-card.active {
            background: linear-gradient(135deg, #39e6cf 0%, #2ecc96 100%);
            border-color: #39e6cf;
            box-shadow: 0 8px 32px rgba(57, 230, 207, 0.4);
        }

        .mode-icon {
            font-size: 36px;
            flex-shrink: 0;
        }

        .mode-text {
            flex: 1;
        }

        .mode-title {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }

        .mode-card.active .mode-title {
            color: #0E1122;
        }

        .mode-desc {
            font-size: 12px;
            color: #8a8d9e;
            margin-top: 2px;
        }

        .mode-card.active .mode-desc {
            color: rgba(14, 17, 34, 0.7);
        }

        .mode-check {
            font-size: 24px;
            color: #39e6cf;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .mode-card.active .mode-check {
            opacity: 1;
            color: #0E1122;
        }

        /* ===== 页脚 ===== */
        .footer {
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 14px 20px;
            background: linear-gradient(180deg, rgba(26, 29, 46, 0.4) 0%, rgba(26, 29, 46, 0.8) 100%);
            border-top: 1px solid rgba(57, 230, 207, 0.1);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #28a745;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        .footer-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .footer-main {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
        }

        .footer-sub {
            font-size: 11px;
            color: #8a8d9e;
            letter-spacing: 0.5px;
        }

        /* ===== 滚动条 ===== */
        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-track {
            background: transparent;
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(57, 230, 207, 0.2);
            border-radius: 3px;
        }

        .content::-webkit-scrollbar-thumb:hover {
            background: rgba(57, 230, 207, 0.4);
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- 顶部导航栏 -->
        <div class="header">
            <div class="app-title">EasyCut</div>
            <div class="header-actions">
                <button class="icon-btn">⚙️</button>
                <button class="icon-btn">📤</button>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="content">
            <!-- 网络状态卡片 -->
            <div class="status-card">
                <div class="status-header">
                    <div class="status-icon">🌐</div>
                    <div>
                        <div class="status-title">网络状态</div>
                    </div>
                </div>

                <div class="status-value">已连接</div>

                <div class="mode-display">
                    <div class="mode-label">当前模式</div>
                    <div class="mode-value">双网模式</div>
                </div>

                <div class="badges">
                    <div class="badge">✓ 外网：启用</div>
                    <div class="badge">✓ 内网：启用</div>
                </div>
            </div>

            <!-- 模式选择卡片 -->
            <div class="modes-container">
                <div class="mode-card">
                    <div class="mode-icon">🛰️</div>
                    <div class="mode-text">
                        <div class="mode-title">启用外网</div>
                        <div class="mode-desc">仅使用外部网络</div>
                    </div>
                </div>

                <div class="mode-card">
                    <div class="mode-icon">🏢</div>
                    <div class="mode-text">
                        <div class="mode-title">启用内网</div>
                        <div class="mode-desc">仅使用内部网络</div>
                    </div>
                </div>

                <div class="mode-card active">
                    <div class="mode-icon">🌐</div>
                    <div class="mode-text">
                        <div class="mode-title">同时启用</div>
                        <div class="mode-desc">同时连接两个网络</div>
                    </div>
                    <div class="mode-check">✓</div>
                </div>
            </div>
        </div>

        <!-- 底部状态栏 -->
        <div class="footer">
            <div class="status-dot"></div>
            <div class="footer-text">
                <div class="footer-main">网络模式（启用外网）</div>
                <div class="footer-sub">外网已连接 • 内网已禁用</div>
            </div>
        </div>
    </div>
</body>
</html>
